<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Multiplicacion</title>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #2a5a2a; color: #f0f0e8; margin: 0; padding: 0; font-family: 'Indie Flower', cursive; }
        .oculto { display: none !important; }

        #nivel { min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 50px 20px 20px 20px; }
        #nivel h1 { font-size: 2em; margin-bottom: 15px; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        #nivel > p { font-size: 1.3em; }
        .menu-opciones { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .btn-menu { background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.4); color: #f0f0e8; padding: 20px; font-size: 1.5em; border-radius: 12px; font-family: 'Indie Flower', cursive; text-shadow: 0 0 5px rgba(255,255,255,0.5); cursor: pointer; }

        #operacion { min-height: 100vh; padding-bottom: 140px; }
        .pizarra-container { padding: 10px; display: flex; justify-content: center; }
        .pizarra { background: #1e4a1e; border: 6px solid #8B4513; border-radius: 8px; padding: 15px; width: 100%; max-width: 380px; box-shadow: inset 0 0 30px rgba(0,0,0,0.3); }
        .progreso { text-align: center; margin-bottom: 10px; font-size: 1.4em; opacity: 0.9; }
        #contenidoPizarra { display: flex; justify-content: center; align-items: center; min-height: 180px; }
        svg { max-width: 100%; height: auto; }

        .panel-inferior {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1a3a1a; padding: 10px; text-align: center;
            border-top: 3px solid #8B4513;
        }
        .panel-inferior p { margin: 5px 0; }
        #mensaje { font-size: 1.2em; min-height: 1.4em; }
        .instruccion { font-size: 1.1em; opacity: 0.7; }
        .btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5); color: #f0f0e8; padding: 12px 16px; border-radius: 8px; margin: 3px; font-size: 1.1em; font-family: 'Indie Flower', cursive; cursor: pointer; }

        /* Ayuda mode */
        .header-pizarra { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .btn-ayuda { background: rgba(255,255,255,0.2); border: 2px solid #ffcc00; color: #ffcc00; width: 36px; height: 36px; border-radius: 50%; font-size: 1.3em; font-family: 'Indie Flower', cursive; cursor: pointer; padding: 0; line-height: 32px; }
        .btn-ayuda.activo { background: #ffcc00; color: #1e4a1e; }
        #panelAyuda { background: rgba(255,204,0,0.15); border: 2px solid #ffcc00; border-radius: 8px; padding: 10px; margin-top: 10px; font-size: 1.1em; line-height: 1.4; }
        #panelAyuda .paso-titulo { color: #ffcc00; font-weight: bold; margin-bottom: 5px; }
        #panelAyuda .paso-instruccion { color: #f0f0e8; }
        .nav-ayuda { display: flex; justify-content: space-between; margin-top: 8px; }
        .nav-ayuda button { background: rgba(255,204,0,0.3); border: 1px solid #ffcc00; color: #ffcc00; padding: 5px 12px; border-radius: 5px; font-family: 'Indie Flower', cursive; cursor: pointer; }
    </style>
</head>
<body>
    <div id="nivel">
        <h1>✖️ Multiplicacion</h1>
        <p style="text-align:center; opacity: 0.8; margin-bottom: 20px;">Elige el nivel</p>
        <div class="menu-opciones">
            <button class="btn-menu" onclick="iniciarConNivel('basico')">📖 Basico</button>
            <button class="btn-menu" onclick="iniciarConNivel('normal')">📝 Normal</button>
            <button class="btn-menu" id="btnAvanzado" onclick="iniciarConNivel('avanzado')" style="display:none;">🎯 Avanzado</button>
            <button class="btn-menu" onclick="window.location.href='/supermente/index.html'" style="margin-top:15px; opacity:0.7;">← Volver</button>
        </div>
    </div>

    <div id="operacion" class="oculto">
        <div class="pizarra-container">
            <div class="pizarra">
                <div class="header-pizarra">
                    <div class="progreso" id="progreso"></div>
                    <button class="btn-ayuda" id="btnAyuda" onclick="toggleAyuda()">?</button>
                </div>
                <div id="contenidoPizarra"></div>
                <div id="panelAyuda" class="oculto"></div>
            </div>
        </div>
        <div class="panel-inferior">
            <p id="mensaje"></p>
            <p class="instruccion">Pulsa en cada casilla para cambiar el numero</p>
            <div>
                <button class="btn" onclick="comprobar()">✓ Comprobar</button>
                <button class="btn" onclick="siguienteEjercicio()">→ Siguiente</button>
                <button class="btn" onclick="window.location.href='/supermente/index.html'">🏠 Menu</button>
            </div>
        </div>
    </div>

    <script>
        var operacionActual = 0;
        var digitosActuales = 1;
        var num1, num2, resultado;
        var nivelActual = 'normal';
        var parcialesEsperados = [];
        var modoAyuda = false;
        var pasoAyuda = 0;
        var edadUsuario = 10;
        var esDecimal = false;
        var decimalPlaces = 0; // Total de decimales en el resultado

        // Cargar edad y mostrar boton avanzado si >= 12
        document.addEventListener('DOMContentLoaded', function() {
            var guardado = localStorage.getItem('usuarioAprendizaje');
            if (guardado) {
                var usuario = JSON.parse(guardado);
                edadUsuario = usuario.edad || 10;
                if (edadUsuario >= 12) {
                    document.getElementById('btnAvanzado').style.display = 'block';
                }
            }
        });

        function iniciarConNivel(nivel) {
            nivelActual = nivel;
            operacionActual = 0;
            digitosActuales = 1;
            document.getElementById('nivel').classList.add('oculto');
            document.getElementById('operacion').classList.remove('oculto');
            generarEjercicio();
        }

        function generarNumero(digitos) {
            if (digitos === 1) return Math.floor(Math.random() * 9) + 1;
            var min = Math.pow(10, digitos - 1);
            var max = Math.pow(10, digitos) - 1;
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generarNumeroDecimal(digEnteros, digDecimales) {
            var parteEntera = generarNumero(digEnteros);
            var parteDecimal = 0;
            for (var i = 0; i < digDecimales; i++) {
                parteDecimal = parteDecimal * 10 + Math.floor(Math.random() * 10);
            }
            return parteEntera + parteDecimal / Math.pow(10, digDecimales);
        }

        function contarDecimales(num) {
            var s = num.toString();
            if (s.indexOf('.') === -1) return 0;
            return s.split('.')[1].length;
        }

        function generarEjercicio() {
            document.getElementById('mensaje').textContent = '';

            if (nivelActual === 'avanzado') {
                esDecimal = operacionActual % 2 === 0;

                if (esDecimal) {
                    // Para multiplicación con decimales, usar números más pequeños
                    // para que sea manejable
                    var dec1 = Math.floor(Math.random() * 2) + 1; // 1-2 decimales
                    var dec2 = Math.floor(Math.random() * 2) + 1; // 1-2 decimales
                    num1 = generarNumeroDecimal(1, dec1); // 1 entero + decimales
                    num2 = generarNumeroDecimal(1, dec2); // 1 entero + decimales
                    decimalPlaces = dec1 + dec2;
                    resultado = Math.round(num1 * num2 * Math.pow(10, decimalPlaces)) / Math.pow(10, decimalPlaces);
                } else {
                    esDecimal = false;
                    decimalPlaces = 0;
                    var dificultad = Math.floor(operacionActual / 2) % 3 + 2;
                    num1 = generarNumero(Math.min(dificultad + 1, 4));
                    num2 = generarNumero(Math.min(dificultad, 3));
                    resultado = num1 * num2;
                }
                digitosActuales = Math.max(num1.toString().replace('.', '').length, num2.toString().replace('.', '').length);
            } else {
                esDecimal = false;
                decimalPlaces = 0;
                digitosActuales = Math.floor(operacionActual / 3) + 1;
                var digMult = Math.min(digitosActuales, 3);
                num1 = generarNumero(digMult);
                var digMult2 = Math.min(Math.floor(digitosActuales / 2) + 1, 2);
                num2 = generarNumero(digMult2);
                resultado = num1 * num2;
            }

            renderizarSVG();
            var nivelTexto = nivelActual === 'basico' ? ' (Basico)' : nivelActual === 'avanzado' ? ' (Avanzado)' : '';
            document.getElementById('progreso').textContent = 'Ejercicio ' + (operacionActual + 1) + nivelTexto;
            if (nivelActual === 'basico') {
                setTimeout(function() { aplicarAyudas(); }, 100);
            }
        }

        function siguienteEjercicio() {
            document.getElementById('mensaje').textContent = '';
            operacionActual++;
            generarEjercicio();
        }

        function formatearNumero(num) {
            var s = num.toString();
            if (s.indexOf('.') !== -1) {
                var partes = s.split('.');
                return { entero: partes[0], decimal: partes[1] || '', completo: partes[0] + partes[1] };
            }
            return { entero: s, decimal: '', completo: s };
        }

        function renderizarSVG() {
            // Para multiplicación, trabajamos con los dígitos sin el punto
            var f1 = formatearNumero(num1);
            var f2 = formatearNumero(num2);
            var fr = formatearNumero(resultado);

            // Strings de dígitos (sin punto decimal)
            var s1 = f1.completo;
            var s2Arr = f2.completo.split('').reverse();
            var sr = fr.completo;
            var maxLen = sr.length;

            // Posiciones de decimales para mostrar
            var dec1Pos = f1.decimal.length > 0 ? f1.entero.length : -1;
            var dec2Pos = f2.decimal.length > 0 ? f2.entero.length : -1;
            var decRPos = fr.decimal.length > 0 ? fr.entero.length : -1;

            parcialesEsperados = [];
            // Para los parciales, multiplicamos entero por cada dígito
            var n1Entero = parseInt(f1.completo);
            for (var i = 0; i < s2Arr.length; i++) {
                parcialesEsperados.push(n1Entero * parseInt(s2Arr[i]));
            }

            var celW = 34, celH = 38;
            var padX = 15, padY = 10;
            var fontSize = 26;
            var numFilas = 2 + s2Arr.length + (s2Arr.length > 1 ? 1 : 0);
            var svgW = padX * 2 + (maxLen + 1) * celW;
            var svgH = padY * 2 + numFilas * celH + 15;
            var xBase = padX + celW;

            var svg = '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" style="font-family: Indie Flower, cursive; font-size: ' + fontSize + 'px;">';

            var y1 = padY + celH;
            var offset1 = maxLen - s1.length - (dec1Pos >= 0 ? 1 : 0);
            var col1 = 0;
            for (var i = 0; i < s1.length; i++) {
                // Añadir coma antes del decimal si aplica
                if (dec1Pos >= 0 && i === dec1Pos) {
                    var xComa = xBase + (offset1 + col1) * celW + celW / 2 - 5;
                    svg += '<text x="' + xComa + '" y="' + y1 + '" text-anchor="middle" fill="#ffaa00" font-size="24">,</text>';
                    col1++;
                }
                var x = xBase + (offset1 + col1) * celW + celW / 2;
                svg += '<text x="' + (x - 10) + '" y="' + (y1 - 22) + '" text-anchor="middle" fill="#ffdd44" font-size="14" font-weight="bold" id="cm' + i + '"></text>';
                svg += '<text x="' + x + '" y="' + y1 + '" text-anchor="middle" fill="#f0f0e8" style="cursor:pointer;" onclick="incrementarCarry(\'cm' + i + '\')">' + s1[i] + '</text>';
                col1++;
            }

            var y2 = y1 + celH;
            svg += '<text x="' + (xBase - celW/2) + '" y="' + y2 + '" text-anchor="middle" fill="#ff9999" font-size="20">x</text>';
            var s2Str = f2.completo;
            var s2Rev = s2Str.split('').reverse();
            var offset2 = maxLen - s2Str.length - (dec2Pos >= 0 ? 1 : 0);
            var col2 = 0;
            for (var i = s2Rev.length - 1; i >= 0; i--) {
                var posEnOriginal = s2Str.length - 1 - i;
                if (dec2Pos >= 0 && posEnOriginal === dec2Pos) {
                    var xComa = xBase + (offset2 + col2) * celW + celW / 2 - 5;
                    svg += '<text x="' + xComa + '" y="' + y2 + '" text-anchor="middle" fill="#ffaa00" font-size="24">,</text>';
                    col2++;
                }
                var x = xBase + (offset2 + col2) * celW + celW / 2;
                svg += '<text x="' + x + '" y="' + y2 + '" text-anchor="middle" fill="#f0f0e8">' + s2Rev[i] + '</text>';
                col2++;
            }
            svg += '<line x1="' + (xBase - celW/2 - 8) + '" y1="' + (y2 + 6) + '" x2="' + (xBase + maxLen * celW) + '" y2="' + (y2 + 6) + '" stroke="#f0f0e8" stroke-width="2"/>';

            var yActual = y2 + celH + 5;
            for (var p = 0; p < s2Arr.length; p++) {
                var ps = parcialesEsperados[p].toString();
                var totalCols = ps.length + p;
                var offsetP = maxLen - totalCols;

                if (p === s2Arr.length - 1 && s2Arr.length > 1) {
                    svg += '<text x="' + (xBase - celW/2) + '" y="' + yActual + '" text-anchor="middle" fill="#ff9999" font-size="16">+</text>';
                }

                for (var i = 0; i < ps.length; i++) {
                    var x = xBase + (offsetP + i) * celW;
                    svg += '<rect x="' + x + '" y="' + (yActual - celH + 8) + '" width="' + (celW - 4) + '" height="' + (celH - 6) + '" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-dasharray="3" rx="4" style="cursor:pointer;" onclick="clickCelda(\'p\', ' + p + ', ' + i + ')"/>';
                    svg += '<text x="' + (x + celW/2 - 2) + '" y="' + yActual + '" text-anchor="middle" fill="#87CEEB" id="p' + p + '_' + i + '" style="pointer-events:none;"></text>';
                }

                for (var i = 0; i < p; i++) {
                    var x = xBase + (offsetP + ps.length + i) * celW + celW / 2;
                    svg += '<text x="' + x + '" y="' + yActual + '" text-anchor="middle" fill="#555">0</text>';
                }

                yActual += celH;
            }

            if (s2Arr.length > 1) {
                svg += '<line x1="' + (xBase - celW/2 - 8) + '" y1="' + (yActual - celH + 3) + '" x2="' + (xBase + maxLen * celW) + '" y2="' + (yActual - celH + 3) + '" stroke="#f0f0e8" stroke-width="2"/>';

                var offsetR = maxLen - sr.length;
                for (var i = 0; i < sr.length; i++) {
                    var x = xBase + (offsetR + i) * celW;
                    svg += '<rect x="' + x + '" y="' + (yActual - celH + 8) + '" width="' + (celW - 4) + '" height="' + (celH - 6) + '" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-dasharray="3" rx="4" style="cursor:pointer;" onclick="clickCelda(\'t\', 0, ' + i + ')"/>';
                    svg += '<text x="' + (x + celW/2 - 2) + '" y="' + yActual + '" text-anchor="middle" fill="#90EE90" id="t0_' + i + '" style="pointer-events:none;"></text>';
                }
            }

            svg += '</svg>';
            document.getElementById('contenidoPizarra').innerHTML = svg;
        }

        function incrementarCarry(id) {
            var el = document.getElementById(id);
            if (el) {
                var v = parseInt(el.textContent) || 0;
                v = (v + 1) % 10;
                el.textContent = v > 0 ? v : '';
            }
        }

        function clickCelda(tipo, fila, col) {
            var id = tipo + fila + '_' + col;
            var el = document.getElementById(id);
            if (el) {
                var v = el.textContent;
                if (v === '') v = '0';
                else {
                    v = parseInt(v);
                    v = v === 9 ? '' : (v + 1).toString();
                }
                el.textContent = v;
            }
        }

        function aplicarAyudas() {
            var fr = formatearNumero(resultado);
            var sr = fr.completo; // Sin punto decimal
            if (sr.length <= 1) return;

            var f2 = formatearNumero(num2);
            var s2Arr = f2.completo.split('').reverse();

            for (var p = 0; p < s2Arr.length; p++) {
                var ps = parcialesEsperados[p].toString();
                if (Math.random() < 0.3) {
                    var idx = Math.floor(Math.random() * ps.length);
                    var el = document.getElementById('p' + p + '_' + idx);
                    if (el) { el.textContent = ps[idx]; el.style.opacity = '0.5'; }
                }
            }
            if (s2Arr.length > 1) {
                if (Math.random() < 0.3) {
                    var idx = Math.floor(Math.random() * sr.length);
                    var el = document.getElementById('t0_' + idx);
                    if (el) { el.textContent = sr[idx]; el.style.opacity = '0.5'; }
                }
            }
        }

        function mostrarErrorCorreccion(el, valorCorrecto) {
            var valorErroneo = el.textContent || '?';
            if (valorErroneo !== valorCorrecto) {
                el.innerHTML = '<tspan fill="#ff6666" text-decoration="line-through">' + valorErroneo + '</tspan><tspan fill="#90EE90" dx="2">' + valorCorrecto + '</tspan>';
            }
        }

        function comprobar() {
            var f2 = formatearNumero(num2);
            var s2Arr = f2.completo.split('').reverse();
            var ok = true;

            for (var p = 0; p < s2Arr.length; p++) {
                var ps = parcialesEsperados[p].toString();
                for (var i = 0; i < ps.length; i++) {
                    var el = document.getElementById('p' + p + '_' + i);
                    var rect = document.querySelector('rect[onclick="clickCelda(\'p\', ' + p + ', ' + i + ')"]');
                    if (el && rect) {
                        if (el.textContent === ps[i]) {
                            rect.setAttribute('fill', 'rgba(0,255,0,0.3)');
                            rect.setAttribute('stroke', 'lightgreen');
                        } else {
                            rect.setAttribute('fill', 'rgba(255,0,0,0.3)');
                            rect.setAttribute('stroke', '#ff6666');
                            mostrarErrorCorreccion(el, ps[i]);
                            ok = false;
                        }
                    }
                }
            }

            if (s2Arr.length > 1) {
                var fr = formatearNumero(resultado);
                var sr = fr.completo; // Sin punto decimal
                for (var i = 0; i < sr.length; i++) {
                    var el = document.getElementById('t0_' + i);
                    var rect = document.querySelector('rect[onclick="clickCelda(\'t\', 0, ' + i + ')"]');
                    if (el && rect) {
                        if (el.textContent === sr[i]) {
                            rect.setAttribute('fill', 'rgba(0,255,0,0.3)');
                            rect.setAttribute('stroke', 'lightgreen');
                        } else {
                            rect.setAttribute('fill', 'rgba(255,0,0,0.3)');
                            rect.setAttribute('stroke', '#ff6666');
                            mostrarErrorCorreccion(el, sr[i]);
                            ok = false;
                        }
                    }
                }
            }

            var msg = document.getElementById('mensaje');
            if (ok) {
                msg.textContent = '¡Muy bien! 🎉';
                msg.style.color = '#90EE90';
                setTimeout(function() { operacionActual++; generarEjercicio(); }, 1200);
            } else {
                msg.textContent = 'Revisa los errores';
                msg.style.color = '#ff9999';
            }
        }

        function toggleAyuda() {
            modoAyuda = !modoAyuda;
            var btn = document.getElementById('btnAyuda');
            var panel = document.getElementById('panelAyuda');
            if (modoAyuda) {
                btn.classList.add('activo');
                panel.classList.remove('oculto');
                pasoAyuda = 0;
                mostrarPasoAyuda();
            } else {
                btn.classList.remove('activo');
                panel.classList.add('oculto');
            }
        }

        function mostrarPasoAyuda() {
            var pasos = generarPasosAyuda();
            if (pasoAyuda >= pasos.length) pasoAyuda = pasos.length - 1;
            if (pasoAyuda < 0) pasoAyuda = 0;

            var panel = document.getElementById('panelAyuda');
            var html = '<div class="paso-titulo">Paso ' + (pasoAyuda + 1) + ' de ' + pasos.length + '</div>';
            html += '<div class="paso-instruccion">' + pasos[pasoAyuda] + '</div>';
            html += '<div class="nav-ayuda">';
            html += '<button onclick="pasoAyuda--; mostrarPasoAyuda();"' + (pasoAyuda === 0 ? ' disabled' : '') + '>← Anterior</button>';
            html += '<button onclick="pasoAyuda++; mostrarPasoAyuda();"' + (pasoAyuda >= pasos.length - 1 ? ' disabled' : '') + '>Siguiente →</button>';
            html += '</div>';
            panel.innerHTML = html;
        }

        function generarPasosAyuda() {
            var pasos = [];

            if (esDecimal) {
                // Ayuda para multiplicación con decimales
                var f1 = formatearNumero(num1);
                var f2 = formatearNumero(num2);
                var totalDecimales = f1.decimal.length + f2.decimal.length;

                pasos.push('Vamos a multiplicar ' + num1 + ' x ' + num2 + '.');
                pasos.push('Cuando multiplicamos decimales, primero contamos el total de cifras decimales.');
                pasos.push(num1 + ' tiene ' + f1.decimal.length + ' decimal(es).');
                pasos.push(num2 + ' tiene ' + f2.decimal.length + ' decimal(es).');
                pasos.push('Total: ' + f1.decimal.length + ' + ' + f2.decimal.length + ' = ' + totalDecimales + ' decimales en el resultado.');
                pasos.push('Ahora multiplicamos como si no hubiera comas, ignorando los decimales.');

                var s1 = f1.completo;
                var s2Arr = f2.completo.split('').reverse();

                for (var p = 0; p < s2Arr.length; p++) {
                    var digito = parseInt(s2Arr[p]);
                    var parcial = parcialesEsperados[p];
                    pasos.push('Multiplicamos todos los dígitos por ' + digito + ': resultado parcial = ' + parcial);
                }

                if (s2Arr.length > 1) {
                    pasos.push('Sumamos todos los productos parciales.');
                }

                var fr = formatearNumero(resultado);
                pasos.push('El producto sin decimales es ' + fr.completo + '.');
                pasos.push('Ahora ponemos la coma: contamos ' + totalDecimales + ' posiciones desde la derecha.');
                pasos.push('El resultado final es ' + resultado);
            } else {
                // Ayuda para multiplicación sin decimales (original)
                var s1 = num1.toString();
                var s2 = num2.toString().split('').reverse();

                pasos.push('Vamos a multiplicar ' + num1 + ' x ' + num2 + '. Multiplicamos ' + num1 + ' por cada digito de ' + num2 + ', empezando por el de la derecha.');

                for (var p = 0; p < s2.length; p++) {
                    var digito = parseInt(s2[p]);
                    var parcial = parcialesEsperados[p];
                    var posicion = p === 0 ? 'unidades' : (p === 1 ? 'decenas' : 'centenas');

                    pasos.push('Ahora multiplicamos ' + num1 + ' x ' + digito + ' (el digito de las ' + posicion + ').');

                    var carry = 0;
                    for (var d = s1.length - 1; d >= 0; d--) {
                        var dig1 = parseInt(s1[d]);
                        var prod = dig1 * digito + carry;
                        var resultado_dig = prod % 10;
                        var nuevo_carry = Math.floor(prod / 10);
                        var colNombre = d === s1.length - 1 ? 'unidades' : (d === s1.length - 2 ? 'decenas' : 'centenas');

                        if (carry > 0) {
                            pasos.push('Digito de ' + colNombre + ': ' + dig1 + ' x ' + digito + ' = ' + (dig1 * digito) + ', mas ' + carry + ' que llevabamos = ' + prod + '.');
                        } else {
                            pasos.push('Digito de ' + colNombre + ': ' + dig1 + ' x ' + digito + ' = ' + prod + '.');
                        }

                        if (prod >= 10) {
                            pasos.push('Como ' + prod + ' tiene dos digitos, escribimos ' + resultado_dig + ' y nos llevamos ' + nuevo_carry + '.');
                        } else {
                            pasos.push('Escribimos ' + resultado_dig + '.');
                        }

                        carry = nuevo_carry;
                    }

                    if (carry > 0) {
                        pasos.push('Nos queda ' + carry + ' de llevada, lo escribimos al principio. Resultado: ' + parcial);
                    }

                    if (p > 0) {
                        pasos.push('Como multiplicamos por las ' + posicion + ', este resultado va desplazado ' + p + ' posicion(es) a la izquierda (o añadimos ' + p + ' cero(s) a la derecha).');
                    }
                }

                if (s2.length > 1) {
                    pasos.push('Ya tenemos todos los productos parciales. Ahora hay que sumarlos todos.');
                    pasos.push('Suma los productos parciales columna por columna, de derecha a izquierda, igual que una suma normal.');
                }
            }

            pasos.push('Completa todas las casillas y pulsa "Comprobar".');
            return pasos;
        }
    </script>
