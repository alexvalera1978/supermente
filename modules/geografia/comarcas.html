<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comarques de Catalunya - SuperMente</title>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Indie Flower', cursive;
            background: #2a5a2a;
            color: #f0f0e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 5px;
        }

        /* Panel superior compacto */
        .top-panel {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            padding: 8px 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 5px;
        }

        .pregunta {
            font-size: 1.3rem;
            color: #f0f0e8;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
            flex: 1;
            min-width: 150px;
        }

        .pregunta small {
            font-size: 0.7rem;
            color: rgba(240,240,232,0.6);
            display: block;
        }

        .stats-mini {
            display: flex;
            gap: 12px;
            font-size: 0.9rem;
            color: rgba(240,240,232,0.8);
        }

        .stats-mini b { color: #e8954a; }

        .mode-row {
            display: flex;
            gap: 4px;
        }

        .mt {
            padding: 4px 8px;
            border-radius: 6px;
            border: 2px solid rgba(255,255,255,0.3);
            background: transparent;
            color: rgba(240,240,232,0.7);
            font-size: 0.75rem;
            font-family: 'Indie Flower', cursive;
            cursor: pointer;
            font-weight: 700;
        }

        .mt.on {
            background: #e8954a;
            color: #1a3a1a;
            border-color: #e8954a;
        }

        /* Feedback */
        .fb {
            text-align: center;
            font-weight: 800;
            font-size: 0.9rem;
            padding: 5px 10px;
            border-radius: 6px;
            min-height: 28px;
        }

        .fc { background: rgba(144,238,144,0.3); color: #90EE90; }
        .fk { background: rgba(255,102,102,0.3); color: #ff6666; }

        /* Barra de progreso */
        .pb-wrap {
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
            height: 4px;
            margin-top: 5px;
        }

        .pb {
            height: 100%;
            background: #e8954a;
            border-radius: 3px;
            transition: width 0.4s;
        }

        /* Mapa - ocupa todo el espacio restante */
        .mw {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
        }

        svg {
            width: 100%;
            height: 100%;
            max-height: calc(100vh - 140px);
            object-fit: contain;
        }

        [data-comarca] { transition: filter 0.1s; }
        [data-comarca]:hover { filter: brightness(1.25); }

        .map-label {
            position: absolute;
            pointer-events: none;
            text-align: center;
            transform: translate(-50%, -50%);
            line-height: 1.1;
        }

        .map-label .nom {
            font-family: 'Indie Flower', cursive;
            font-size: 0.7rem;
            font-weight: 800;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 1px 3px #000, 0 0 6px #000;
        }

        .map-label .cap {
            font-family: 'Indie Flower', cursive;
            font-size: 0.6rem;
            color: #90EE90;
            text-shadow: 0 1px 3px #000, 0 0 6px #000;
        }

        /* Overlay resultado */
        #ov {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            z-index: 300;
            justify-content: center;
            align-items: center;
        }

        #ov.show { display: flex; }

        .rc {
            background: rgba(42,90,42,0.95);
            border: 3px solid #e8954a;
            border-radius: 14px;
            padding: 24px;
            text-align: center;
            max-width: 280px;
        }

        .rc h2 {
            color: #e8954a;
            font-size: 1.6rem;
            margin-bottom: 4px;
        }

        .rs {
            font-size: 2.5rem;
            font-weight: 800;
            color: #f0f0e8;
            margin: 8px 0;
        }

        .rc p {
            color: rgba(240,240,232,0.7);
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .rc button {
            padding: 8px 18px;
            background: #e8954a;
            color: #1a3a1a;
            border: none;
            border-radius: 8px;
            font-family: 'Indie Flower', cursive;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            margin: 4px;
        }

        /* Botón volver */
        .btn-volver {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.3);
            color: #f0f0e8;
            padding: 6px 12px;
            border-radius: 8px;
            font-family: 'Indie Flower', cursive;
            font-size: 0.9rem;
            cursor: pointer;
            z-index: 100;
        }

        /* Leyenda pequeña */
        .legend {
            position: fixed;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            font-size: 0.65rem;
            color: rgba(240,240,232,0.6);
            z-index: 100;
        }

        .leg {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .lsq {
            width: 10px;
            height: 10px;
            border-radius: 2px;
        }

        /* Desktop */
        @media screen and (min-width: 769px) {
            body { padding: 10px; }

            .top-panel { padding: 12px 16px; }

            .pregunta { font-size: 1.5rem; }

            svg { max-height: calc(100vh - 160px); }

            .map-label .nom { font-size: 0.8rem; }
            .map-label .cap { font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <!-- Panel superior compacto -->
    <div class="top-panel">
        <div class="pregunta">
            <small id="ql">Carregant...</small>
            <span id="qtext">—</span>
        </div>
        <div class="stats-mini">
            <span>✓ <b id="sc">0</b></span>
            <span><b id="qn">0</b>/<b id="tot">0</b></span>
        </div>
        <div class="mode-row">
            <button class="mt on" id="m-comarca" onclick="setMode('comarca')">Comarca</button>
            <button class="mt" id="m-capital" onclick="setMode('capital')">Capital</button>
            <button class="mt" id="m-mixed" onclick="setMode('mixed')">Mixt</button>
        </div>
        <div class="fb" id="fb"></div>
        <div class="pb-wrap" style="width:100%"><div class="pb" id="pb" style="width:0%"></div></div>
    </div>

    <!-- Mapa ocupa todo el espacio -->
    <div class="mw" id="mapwrap"></div>

    <!-- Overlay resultado -->
    <div id="ov">
        <div class="rc">
            <h2>Resultat</h2>
            <div class="rs" id="rs">0 / 0</div>
            <p id="rm"></p>
            <button onclick="restart()">Tornar a jugar</button>
            <button onclick="volverMenu()">Menú</button>
        </div>
    </div>

    <button class="btn-volver" onclick="volverMenu()">← Tornar</button>

    <div class="legend">
        <div class="leg"><div class="lsq" style="background:#90EE90"></div>OK</div>
        <div class="leg"><div class="lsq" style="background:#e8954a"></div>Pendent</div>
    </div>

    <script src="comarcas.js"></script>
</body>
</html>
