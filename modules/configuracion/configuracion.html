<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configuracion</title>
    <link rel="stylesheet" href="/supermente/css/common.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Permitir scroll en configuracion */
        #configuracion { overflow-y: auto !important; padding: 15px 10px 30px 10px; }
        #configuracion h1 { margin-top: 0; font-size: 1.5em; }
        .config-container { padding-bottom: 20px; }

        .font-selector { display: flex; gap: 12px; justify-content: center; margin: 10px 0; }
        .font-option { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; padding: 12px 20px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 2px solid rgba(255,255,255,0.3); }
        .font-option.selected { border-color: #00c9ff; background: rgba(0,201,255,0.2); }
        .font-option input { display: none; }
        .font-preview { font-size: 1.8em; }
        .font-ejemplo { text-align: center; font-size: 1.2em; padding: 12px; background: rgba(255,255,255,0.9); color: #333; border-radius: 8px; line-height: 1.6; margin-top: 10px; }
        .font-ejemplo.ligada { font-family: 'Kalam', cursive; }
    </style>
</head>
<body>
    <div id="configuracion" class="pantalla activa tiza">
        <h1>⚙️ Configuracion</h1>
        <div class="config-container">
            <p class="config-info">Introduce tu API key para generar cuestionarios con IA.<br>Las keys se guardan localmente en tu dispositivo.</p>

            <div class="config-section">
                <h3>Proveedor de IA</h3>
                <div class="provider-selector">
                    <label class="provider-option">
                        <input type="radio" name="aiProvider" value="claude" onchange="cambiarProveedor('claude')">
                        <span class="provider-icon">🟠</span> Claude (Anthropic)
                    </label>
                    <label class="provider-option">
                        <input type="radio" name="aiProvider" value="openai" onchange="cambiarProveedor('openai')">
                        <span class="provider-icon">🟢</span> ChatGPT (OpenAI)
                    </label>
                    <label class="provider-option">
                        <input type="radio" name="aiProvider" value="gemini" onchange="cambiarProveedor('gemini')">
                        <span class="provider-icon">🔵</span> Gemini (Google)
                    </label>
                </div>
            </div>

            <div class="config-section">
                <h3>API Keys</h3>
                <div class="api-key-group">
                    <label>Claude (Anthropic)</label>
                    <div class="input-with-toggle">
                        <input type="password" id="apiKeyClaude" class="input-tema" placeholder="sk-ant-api..." onchange="guardarApiKey('claude')">
                        <button class="btn-toggle-key" onclick="toggleKeyVisibility('apiKeyClaude')">👁️</button>
                    </div>
                </div>
                <div class="api-key-group">
                    <label>ChatGPT (OpenAI)</label>
                    <div class="input-with-toggle">
                        <input type="password" id="apiKeyOpenAI" class="input-tema" placeholder="sk-..." onchange="guardarApiKey('openai')">
                        <button class="btn-toggle-key" onclick="toggleKeyVisibility('apiKeyOpenAI')">👁️</button>
                    </div>
                </div>
                <div class="api-key-group">
                    <label>Gemini (Google)</label>
                    <div class="input-with-toggle">
                        <input type="password" id="apiKeyGemini" class="input-tema" placeholder="AIza..." onchange="guardarApiKey('gemini')">
                        <button class="btn-toggle-key" onclick="toggleKeyVisibility('apiKeyGemini')">👁️</button>
                    </div>
                </div>
                <div class="api-key-group">
                    <label>Groq (transcripcion voz)</label>
                    <div class="input-with-toggle">
                        <input type="password" id="apiKeyGroq" class="input-tema" placeholder="gsk_..." onchange="guardarApiKey('groq')">
                        <button class="btn-toggle-key" onclick="toggleKeyVisibility('apiKeyGroq')">👁️</button>
                    </div>
                </div>
            </div>

            <div class="config-section">
                <h3>Tipo de Letra</h3>
                <div class="font-selector">
                    <label class="font-option">
                        <input type="radio" name="tipoLetra" value="normal" onchange="cambiarTipoLetra('normal')" checked>
                        <span class="font-preview" style="font-family: Georgia, serif;">Aa</span>
                        <span>Normal</span>
                    </label>
                    <label class="font-option">
                        <input type="radio" name="tipoLetra" value="ligada" onchange="cambiarTipoLetra('ligada')">
                        <span class="font-preview" style="font-family: 'Kalam', cursive;">Aa</span>
                        <span>Ligada</span>
                    </label>
                </div>
                <p class="font-ejemplo" id="fontEjemplo">La nina lee un libro muy bonito.</p>
            </div>

            <div class="config-section">
                <div id="estadoConfig" class="estado-config"></div>
                <button class="btn" onclick="probarConexion()">🔌 Probar conexion</button>
            </div>
        </div>
        <div class="botones-control" style="margin-top:15px;">
            <button class="btn" onclick="window.location.href='../../index.html'">← Volver</button>
        </div>
    </div>

    <script src="/supermente/js/common.js?v=2"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            cargarConfiguracion();
            cargarTipoLetra();
        });

        function cargarTipoLetra() {
            var tipo = localStorage.getItem('tipoLetra') || 'normal';
            var radio = document.querySelector('input[name="tipoLetra"][value="' + tipo + '"]');
            if (radio) radio.checked = true;
            aplicarTipoLetra(tipo);
            actualizarSeleccionLetra(tipo);
        }

        function cambiarTipoLetra(tipo) {
            localStorage.setItem('tipoLetra', tipo);
            aplicarTipoLetra(tipo);
            actualizarSeleccionLetra(tipo);
        }

        function aplicarTipoLetra(tipo) {
            var ejemplo = document.getElementById('fontEjemplo');
            if (tipo === 'ligada') {
                ejemplo.classList.add('ligada');
            } else {
                ejemplo.classList.remove('ligada');
            }
        }

        function actualizarSeleccionLetra(tipo) {
            document.querySelectorAll('.font-option').forEach(function(opt) {
                opt.classList.remove('selected');
            });
            var radio = document.querySelector('input[name="tipoLetra"][value="' + tipo + '"]');
            if (radio && radio.parentElement) {
                radio.parentElement.classList.add('selected');
            }
        }
    </script>
</body>
</html>
