<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Suma</title>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #2a5a2a; color: #f0f0e8; margin: 0; padding: 0; font-family: 'Indie Flower', cursive; }
        .oculto { display: none !important; }

        /* Nivel selection */
        #nivel { min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; padding: 50px 20px 20px 20px; }
        #nivel h1 { font-size: 2em; margin-bottom: 15px; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
        #nivel > p { font-size: 1.3em; }
        .menu-opciones { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        .btn-menu { background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.4); color: #f0f0e8; padding: 20px; font-size: 1.5em; border-radius: 12px; font-family: 'Indie Flower', cursive; text-shadow: 0 0 5px rgba(255,255,255,0.5); cursor: pointer; }

        /* Operacion screen */
        #operacion { min-height: 100vh; padding-bottom: 140px; }
        .pizarra-container { padding: 10px; display: flex; justify-content: center; }
        .pizarra { background: #1e4a1e; border: 6px solid #8B4513; border-radius: 8px; padding: 15px; width: 100%; max-width: 350px; box-shadow: inset 0 0 30px rgba(0,0,0,0.3); }
        .progreso { text-align: center; margin-bottom: 10px; font-size: 1.4em; opacity: 0.9; }
        #contenidoPizarra { display: flex; justify-content: center; align-items: center; min-height: 150px; }
        svg { max-width: 100%; height: auto; }

        /* Fixed bottom panel */
        .panel-inferior {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1a3a1a; padding: 10px; text-align: center;
            border-top: 3px solid #8B4513;
        }
        .panel-inferior p { margin: 5px 0; }
        #mensaje { font-size: 1.2em; min-height: 1.4em; }
        .instruccion { font-size: 1.1em; opacity: 0.7; }
        .btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5); color: #f0f0e8; padding: 12px 16px; border-radius: 8px; margin: 3px; font-size: 1.1em; font-family: 'Indie Flower', cursive; cursor: pointer; }

        /* Ayuda mode */
        .header-pizarra { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .btn-ayuda { background: rgba(255,255,255,0.2); border: 2px solid #ffcc00; color: #ffcc00; width: 36px; height: 36px; border-radius: 50%; font-size: 1.3em; font-family: 'Indie Flower', cursive; cursor: pointer; padding: 0; line-height: 32px; }
        .btn-ayuda.activo { background: #ffcc00; color: #1e4a1e; }
        #panelAyuda { background: rgba(255,204,0,0.15); border: 2px solid #ffcc00; border-radius: 8px; padding: 10px; margin-top: 10px; font-size: 1.1em; line-height: 1.4; }
        #panelAyuda .paso-titulo { color: #ffcc00; font-weight: bold; margin-bottom: 5px; }
        #panelAyuda .paso-instruccion { color: #f0f0e8; }
        .nav-ayuda { display: flex; justify-content: space-between; margin-top: 8px; }
        .nav-ayuda button { background: rgba(255,204,0,0.3); border: 1px solid #ffcc00; color: #ffcc00; padding: 5px 12px; border-radius: 5px; font-family: 'Indie Flower', cursive; cursor: pointer; }
    </style>
</head>
<body>
    <div id="nivel">
        <h1>➕ Suma</h1>
        <p style="text-align:center; opacity: 0.8; margin-bottom: 20px;">Elige el nivel</p>
        <div class="menu-opciones">
            <button class="btn-menu" onclick="iniciarConNivel('basico')">📖 Basico</button>
            <button class="btn-menu" onclick="iniciarConNivel('normal')">📝 Normal</button>
            <button class="btn-menu" id="btnAvanzado" onclick="iniciarConNivel('avanzado')" style="display:none;">🎯 Avanzado</button>
            <button class="btn-menu" onclick="window.location.href='/supermente/index.html'" style="margin-top:15px; opacity:0.7;">← Volver</button>
        </div>
    </div>

    <div id="operacion" class="oculto">
        <div class="pizarra-container">
            <div class="pizarra">
                <div class="header-pizarra">
                    <div class="progreso" id="progreso"></div>
                    <button class="btn-ayuda" id="btnAyuda" onclick="toggleAyuda()">?</button>
                </div>
                <div id="contenidoPizarra"></div>
                <div id="panelAyuda" class="oculto"></div>
            </div>
        </div>
        <div class="panel-inferior">
            <p id="mensaje"></p>
            <p class="instruccion">Pulsa en cada casilla para cambiar el numero</p>
            <div>
                <button class="btn" onclick="comprobar()">✓ Comprobar</button>
                <button class="btn" onclick="siguienteEjercicio()">→ Siguiente</button>
                <button class="btn" onclick="window.location.href='/supermente/index.html'">🏠 Menu</button>
            </div>
        </div>
    </div>

    <script>
        var operacionActual = 0;
        var digitosActuales = 1;
        var num1, num2, resultado;
        var nivelActual = 'normal';
        var modoAyuda = false;
        var pasoAyuda = 0;
        var edadUsuario = 10;
        var esDecimal = false; // Para alternar en modo avanzado

        // Cargar edad y mostrar boton avanzado si >= 12
        document.addEventListener('DOMContentLoaded', function() {
            var guardado = localStorage.getItem('usuarioAprendizaje');
            if (guardado) {
                var usuario = JSON.parse(guardado);
                edadUsuario = usuario.edad || 10;
                if (edadUsuario >= 12) {
                    document.getElementById('btnAvanzado').style.display = 'block';
                }
            }
        });

        function iniciarConNivel(nivel) {
            nivelActual = nivel;
            operacionActual = 0;
            digitosActuales = 1;
            document.getElementById('nivel').classList.add('oculto');
            document.getElementById('operacion').classList.remove('oculto');
            generarEjercicio();
        }

        function generarNumero(digitos) {
            if (digitos === 1) return Math.floor(Math.random() * 9) + 1;
            var min = Math.pow(10, digitos - 1);
            var max = Math.pow(10, digitos) - 1;
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function generarNumeroDecimal(digEnteros, digDecimales) {
            var parteEntera = generarNumero(digEnteros);
            var parteDecimal = 0;
            for (var i = 0; i < digDecimales; i++) {
                parteDecimal = parteDecimal * 10 + Math.floor(Math.random() * 10);
            }
            return parteEntera + parteDecimal / Math.pow(10, digDecimales);
        }

        function generarEjercicio() {
            document.getElementById('mensaje').textContent = '';

            if (nivelActual === 'avanzado') {
                // Alternar entre decimales y enteros grandes
                esDecimal = operacionActual % 2 === 0;

                if (esDecimal) {
                    // Con decimales: 2-3 enteros + 1-3 decimales
                    var digDecimales = Math.floor(Math.random() * 3) + 1; // 1-3 decimales
                    num1 = generarNumeroDecimal(2, digDecimales);
                    num2 = generarNumeroDecimal(2, digDecimales);
                    resultado = Math.round((num1 + num2) * 1000) / 1000; // Evitar errores de punto flotante
                } else {
                    // Sin decimales: números grandes
                    var dificultad = Math.floor(operacionActual / 2) % 3 + 3; // 3, 4 o 5 dígitos
                    digitosActuales = dificultad;
                    num1 = generarNumero(digitosActuales);
                    num2 = generarNumero(Math.max(2, digitosActuales - 1));
                    resultado = num1 + num2;
                }
            } else {
                esDecimal = false;
                digitosActuales = Math.floor(operacionActual / 3) + 1;
                num1 = generarNumero(digitosActuales);
                num2 = generarNumero(digitosActuales);
                resultado = num1 + num2;
            }

            renderizarSVG();
            var nivelTexto = nivelActual === 'basico' ? ' (Basico)' : nivelActual === 'avanzado' ? ' (Avanzado)' : '';
            document.getElementById('progreso').textContent = 'Ejercicio ' + (operacionActual + 1) + nivelTexto;
            if (nivelActual === 'basico') {
                setTimeout(function() { aplicarAyudas(); }, 100);
            }
        }

        function siguienteEjercicio() {
            document.getElementById('mensaje').textContent = '';
            operacionActual++;
            generarEjercicio();
        }

        function formatearNumero(num) {
            // Formatea el número y retorna array de caracteres incluyendo el punto decimal
            var s = num.toString();
            // Asegurar que los decimales tengan formato consistente
            if (s.indexOf('.') !== -1) {
                var partes = s.split('.');
                return { entero: partes[0], decimal: partes[1] || '' };
            }
            return { entero: s, decimal: '' };
        }

        function renderizarSVG() {
            var f1 = formatearNumero(num1);
            var f2 = formatearNumero(num2);
            var fr = formatearNumero(resultado);

            var maxEnteros = Math.max(f1.entero.length, f2.entero.length, fr.entero.length);
            var maxDecimales = Math.max(f1.decimal.length, f2.decimal.length, fr.decimal.length);
            var tieneDecimales = maxDecimales > 0;

            var celW = 40, celH = 50;
            var padX = 20, padY = 15;
            var fontSize = 36;
            var puntoW = tieneDecimales ? 20 : 0; // Ancho para el punto decimal
            var totalCols = maxEnteros + (tieneDecimales ? 1 : 0) + maxDecimales; // +1 para el punto
            var svgW = padX * 2 + (totalCols + 1) * celW;
            var svgH = padY * 2 + celH * 3 + 20;
            var xBase = padX + celW;

            var svg = '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" style="font-family: Indie Flower, cursive; font-size: ' + fontSize + 'px;">';

            // Funcion auxiliar para renderizar numero
            function renderNumero(f, y, conCarry, carryPrefix) {
                var offset = maxEnteros - f.entero.length;
                var resultado = '';
                var colIdx = 0;

                // Parte entera
                for (var i = 0; i < f.entero.length; i++) {
                    var x = xBase + (offset + i) * celW + celW / 2;
                    if (conCarry) {
                        resultado += '<text x="' + (x - 12) + '" y="' + (y - 30) + '" text-anchor="middle" fill="#ffdd44" font-size="16" font-weight="bold" id="' + carryPrefix + colIdx + '"></text>';
                        resultado += '<text x="' + x + '" y="' + y + '" text-anchor="middle" fill="#f0f0e8" style="cursor:pointer;" onclick="incrementarCarry(\'' + carryPrefix + colIdx + '\')">' + f.entero[i] + '</text>';
                    } else {
                        resultado += '<text x="' + x + '" y="' + y + '" text-anchor="middle" fill="#f0f0e8">' + f.entero[i] + '</text>';
                    }
                    colIdx++;
                }

                // Punto decimal
                if (tieneDecimales) {
                    var xPunto = xBase + maxEnteros * celW + puntoW / 2;
                    resultado += '<text x="' + xPunto + '" y="' + y + '" text-anchor="middle" fill="#ffaa00" font-size="40">,</text>';
                }

                // Parte decimal
                var decStr = f.decimal;
                while (decStr.length < maxDecimales) decStr += '0'; // Rellenar con ceros
                for (var i = 0; i < decStr.length; i++) {
                    var x = xBase + maxEnteros * celW + puntoW + i * celW + celW / 2;
                    if (conCarry) {
                        resultado += '<text x="' + x + '" y="' + y + '" text-anchor="middle" fill="#f0f0e8" style="cursor:pointer;" onclick="incrementarCarry(\'' + carryPrefix + colIdx + '\')">' + decStr[i] + '</text>';
                    } else {
                        resultado += '<text x="' + x + '" y="' + y + '" text-anchor="middle" fill="#f0f0e8">' + decStr[i] + '</text>';
                    }
                    colIdx++;
                }

                return resultado;
            }

            // Primera fila (num1 con carries)
            var y1 = padY + celH;
            svg += renderNumero(f1, y1, true, 'cs');

            // Segunda fila (num2)
            var y2 = y1 + celH;
            svg += '<text x="' + (xBase - celW/2) + '" y="' + y2 + '" text-anchor="middle" fill="#ff9999" font-size="28">+</text>';
            svg += renderNumero(f2, y2, false, '');

            // Linea
            var lineaEnd = xBase + maxEnteros * celW + (tieneDecimales ? puntoW + maxDecimales * celW : 0);
            svg += '<line x1="' + (xBase - celW/2 - 10) + '" y1="' + (y2 + 10) + '" x2="' + lineaEnd + '" y2="' + (y2 + 10) + '" stroke="#f0f0e8" stroke-width="3"/>';

            // Resultado (celdas editables)
            var y3 = y2 + celH + 15;
            var offsetR = maxEnteros - fr.entero.length;
            var cellIdx = 0;

            // Parte entera del resultado
            for (var i = 0; i < fr.entero.length; i++) {
                var x = xBase + (offsetR + i) * celW;
                svg += '<rect x="' + x + '" y="' + (y3 - celH + 15) + '" width="' + (celW - 6) + '" height="' + (celH - 10) + '" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-dasharray="4" rx="5" style="cursor:pointer;" onclick="clickCelda(' + cellIdx + ')"/>';
                svg += '<text x="' + (x + celW/2 - 3) + '" y="' + y3 + '" text-anchor="middle" fill="#90EE90" id="res' + cellIdx + '" style="pointer-events:none;"></text>';
                cellIdx++;
            }

            // Punto decimal en resultado
            if (tieneDecimales) {
                var xPunto = xBase + maxEnteros * celW + puntoW / 2;
                svg += '<text x="' + xPunto + '" y="' + y3 + '" text-anchor="middle" fill="#ffaa00" font-size="40">,</text>';

                // Parte decimal del resultado
                var decR = fr.decimal;
                while (decR.length < maxDecimales) decR += '0';
                for (var i = 0; i < decR.length; i++) {
                    var x = xBase + maxEnteros * celW + puntoW + i * celW;
                    svg += '<rect x="' + x + '" y="' + (y3 - celH + 15) + '" width="' + (celW - 6) + '" height="' + (celH - 10) + '" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-dasharray="4" rx="5" style="cursor:pointer;" onclick="clickCelda(' + cellIdx + ')"/>';
                    svg += '<text x="' + (x + celW/2 - 3) + '" y="' + y3 + '" text-anchor="middle" fill="#90EE90" id="res' + cellIdx + '" style="pointer-events:none;"></text>';
                    cellIdx++;
                }
            }

            svg += '</svg>';
            document.getElementById('contenidoPizarra').innerHTML = svg;
        }

        function incrementarCarry(id) {
            var el = document.getElementById(id);
            if (el) {
                var v = parseInt(el.textContent) || 0;
                v = (v + 1) % 10;
                el.textContent = v > 0 ? v : '';
            }
        }

        function clickCelda(i) {
            var el = document.getElementById('res' + i);
            if (el) {
                var v = el.textContent;
                if (v === '') v = '0';
                else {
                    v = parseInt(v);
                    v = v === 9 ? '' : (v + 1).toString();
                }
                el.textContent = v;
            }
        }

        function aplicarAyudas() {
            // Construir string esperado sin el punto decimal
            var fr = formatearNumero(resultado);
            var maxDecimales = 0;
            if (esDecimal) {
                var f1 = formatearNumero(num1);
                var f2 = formatearNumero(num2);
                maxDecimales = Math.max(f1.decimal.length, f2.decimal.length, fr.decimal.length);
            }
            var decR = fr.decimal;
            while (decR.length < maxDecimales) decR += '0';
            var sr = fr.entero + decR;

            if (sr.length <= 1) return;
            var numAyudas = Math.max(1, Math.floor(sr.length * 0.3));
            var usados = [];
            for (var n = 0; n < numAyudas; n++) {
                var idx;
                do { idx = Math.floor(Math.random() * sr.length); } while (usados.indexOf(idx) !== -1);
                usados.push(idx);
                var el = document.getElementById('res' + idx);
                if (el) {
                    el.textContent = sr[idx];
                    el.style.opacity = '0.5';
                }
            }
        }

        function mostrarErrorCorreccion(el, valorCorrecto) {
            var valorErroneo = el.textContent || '?';
            if (valorErroneo !== valorCorrecto) {
                el.innerHTML = '<tspan fill="#ff6666" text-decoration="line-through">' + valorErroneo + '</tspan><tspan fill="#90EE90" dx="2">' + valorCorrecto + '</tspan>';
            }
        }

        function comprobar() {
            // Construir string esperado sin el punto decimal
            var fr = formatearNumero(resultado);
            var maxDecimales = 0;
            if (esDecimal) {
                var f1 = formatearNumero(num1);
                var f2 = formatearNumero(num2);
                maxDecimales = Math.max(f1.decimal.length, f2.decimal.length, fr.decimal.length);
            }
            var decR = fr.decimal;
            while (decR.length < maxDecimales) decR += '0';
            var sr = fr.entero + decR; // Sin el punto, solo dígitos

            var ok = true;
            for (var i = 0; i < sr.length; i++) {
                var el = document.getElementById('res' + i);
                var rect = document.querySelector('rect[onclick="clickCelda(' + i + ')"]');
                if (el && rect) {
                    if (el.textContent === sr[i]) {
                        rect.setAttribute('fill', 'rgba(0,255,0,0.3)');
                        rect.setAttribute('stroke', 'lightgreen');
                    } else {
                        rect.setAttribute('fill', 'rgba(255,0,0,0.3)');
                        rect.setAttribute('stroke', '#ff6666');
                        mostrarErrorCorreccion(el, sr[i]);
                        ok = false;
                    }
                }
            }
            var msg = document.getElementById('mensaje');
            if (ok) {
                msg.textContent = '¡Muy bien! 🎉';
                msg.style.color = '#90EE90';
                setTimeout(function() { operacionActual++; generarEjercicio(); }, 1200);
            } else {
                msg.textContent = 'Revisa los errores';
                msg.style.color = '#ff9999';
            }
        }

        function toggleAyuda() {
            modoAyuda = !modoAyuda;
            var btn = document.getElementById('btnAyuda');
            var panel = document.getElementById('panelAyuda');
            if (modoAyuda) {
                btn.classList.add('activo');
                panel.classList.remove('oculto');
                pasoAyuda = 0;
                mostrarPasoAyuda();
            } else {
                btn.classList.remove('activo');
                panel.classList.add('oculto');
            }
        }

        function mostrarPasoAyuda() {
            var s1 = num1.toString(), s2 = num2.toString(), sr = resultado.toString();
            var maxLen = Math.max(s1.length, s2.length, sr.length);
            var pasos = generarPasosAyuda(s1, s2, sr, maxLen);

            if (pasoAyuda >= pasos.length) pasoAyuda = pasos.length - 1;
            if (pasoAyuda < 0) pasoAyuda = 0;

            var panel = document.getElementById('panelAyuda');
            var html = '<div class="paso-titulo">Paso ' + (pasoAyuda + 1) + ' de ' + pasos.length + '</div>';
            html += '<div class="paso-instruccion">' + pasos[pasoAyuda] + '</div>';
            html += '<div class="nav-ayuda">';
            html += '<button onclick="pasoAyuda--; mostrarPasoAyuda();"' + (pasoAyuda === 0 ? ' disabled' : '') + '>← Anterior</button>';
            html += '<button onclick="pasoAyuda++; mostrarPasoAyuda();"' + (pasoAyuda >= pasos.length - 1 ? ' disabled' : '') + '>Siguiente →</button>';
            html += '</div>';
            panel.innerHTML = html;
        }

        function generarPasosAyuda(s1, s2, sr, maxLen) {
            var pasos = [];

            if (esDecimal) {
                // Ayuda para sumas con decimales
                var f1 = formatearNumero(num1);
                var f2 = formatearNumero(num2);
                var fr = formatearNumero(resultado);
                var maxDec = Math.max(f1.decimal.length, f2.decimal.length);

                pasos.push('Vamos a sumar ' + num1 + ' + ' + num2 + '. Como tienen decimales, debemos alinear las comas.');
                pasos.push('Importante: La coma del resultado va alineada con las comas de los números.');
                pasos.push('Empezamos por la derecha, sumando primero los decimales.');

                // Rellenar decimales para que tengan igual longitud
                var dec1 = f1.decimal; while (dec1.length < maxDec) dec1 += '0';
                var dec2 = f2.decimal; while (dec2.length < maxDec) dec2 += '0';
                var decR = fr.decimal; while (decR.length < maxDec) decR += '0';

                var carry = 0;
                var nombresDecimales = ['milésimas', 'centésimas', 'décimas'];

                // Parte decimal (de derecha a izquierda)
                for (var i = maxDec - 1; i >= 0; i--) {
                    var d1 = parseInt(dec1[i]) || 0;
                    var d2 = parseInt(dec2[i]) || 0;
                    var suma = d1 + d2 + carry;
                    var digito = suma % 10;
                    var nuevoCarry = Math.floor(suma / 10);
                    var nombrePos = nombresDecimales[maxDec - 1 - i] || 'decimal';

                    if (carry > 0) {
                        pasos.push('Columna de ' + nombrePos + ': ' + d1 + ' + ' + d2 + ' + ' + carry + ' (llevada) = ' + suma);
                    } else {
                        pasos.push('Columna de ' + nombrePos + ': ' + d1 + ' + ' + d2 + ' = ' + suma);
                    }

                    if (suma >= 10) {
                        pasos.push('Escribimos ' + digito + ' y nos llevamos ' + nuevoCarry + '.');
                    }
                    carry = nuevoCarry;
                }

                pasos.push('Ahora ponemos la coma decimal en el resultado.');

                // Parte entera
                var maxEnt = Math.max(f1.entero.length, f2.entero.length);
                var ent1 = f1.entero; while (ent1.length < maxEnt) ent1 = '0' + ent1;
                var ent2 = f2.entero; while (ent2.length < maxEnt) ent2 = '0' + ent2;
                var nombresEnteros = ['unidades', 'decenas', 'centenas', 'millares'];

                for (var i = maxEnt - 1; i >= 0; i--) {
                    var d1 = parseInt(ent1[i]) || 0;
                    var d2 = parseInt(ent2[i]) || 0;
                    var suma = d1 + d2 + carry;
                    var digito = suma % 10;
                    var nuevoCarry = Math.floor(suma / 10);
                    var nombrePos = nombresEnteros[maxEnt - 1 - i] || 'entero';

                    if (carry > 0) {
                        pasos.push('Columna de ' + nombrePos + ': ' + d1 + ' + ' + d2 + ' + ' + carry + ' = ' + suma);
                    } else {
                        pasos.push('Columna de ' + nombrePos + ': ' + d1 + ' + ' + d2 + ' = ' + suma);
                    }
                    carry = nuevoCarry;
                }

                if (carry > 0) {
                    pasos.push('Nos queda una llevada de ' + carry + ', la escribimos al principio.');
                }

                pasos.push('El resultado es ' + resultado);
            } else {
                // Ayuda para sumas sin decimales (original)
                pasos.push('Vamos a sumar ' + num1 + ' + ' + num2 + '. Siempre empezamos por la derecha, por la columna de las unidades.');

                var carry = 0;
                for (var col = 0; col < maxLen; col++) {
                    var pos1 = s1.length - 1 - col;
                    var pos2 = s2.length - 1 - col;
                    var d1 = pos1 >= 0 ? parseInt(s1[pos1]) : 0;
                    var d2 = pos2 >= 0 ? parseInt(s2[pos2]) : 0;
                    var suma = d1 + d2 + carry;
                    var digito = suma % 10;
                    var nuevoCarry = Math.floor(suma / 10);

                    var nombreCol = col === 0 ? 'unidades' : (col === 1 ? 'decenas' : (col === 2 ? 'centenas' : 'millares'));

                    if (carry > 0) {
                        pasos.push('Columna de ' + nombreCol + ': Tenemos ' + d1 + ' + ' + d2 + ', pero tambien la llevada de antes (+' + carry + ').');
                        pasos.push('Sumamos: ' + d1 + ' + ' + d2 + ' + ' + carry + ' = ' + suma + '.');
                    } else {
                        pasos.push('Columna de ' + nombreCol + ': Sumamos ' + d1 + ' + ' + d2 + ' = ' + suma + '.');
                    }

                    if (suma >= 10) {
                        pasos.push('Como ' + suma + ' tiene dos digitos, escribimos solo el ' + digito + ' y "nos llevamos" ' + nuevoCarry + ' a la siguiente columna.');
                        if (col < maxLen - 1) {
                            pasos.push('Pulsa encima del numero de la siguiente columna para marcar que te llevas ' + nuevoCarry + '.');
                        }
                    } else {
                        pasos.push('Escribimos ' + digito + ' en el resultado.');
                    }

                    carry = nuevoCarry;
                }
            }

            pasos.push('Completa todas las casillas y pulsa "Comprobar".');
            return pasos;
        }
    </script>
