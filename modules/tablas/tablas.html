<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tablas de Multiplicar</title>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #2a5a2a; color: #f0f0e8; margin: 0; padding: 0; font-family: 'Indie Flower', cursive; }
        .oculto { display: none !important; }

        #operacion { min-height: 100vh; padding-bottom: 130px; }
        .pizarra-container { padding: 10px; display: flex; justify-content: center; }
        .pizarra { background: #1e4a1e; border: 6px solid #8B4513; border-radius: 8px; padding: 10px; width: 100%; max-width: 320px; box-shadow: inset 0 0 30px rgba(0,0,0,0.3); }
        .progreso { text-align: center; margin-bottom: 5px; font-size: 1.4em; opacity: 0.9; }
        #contenidoPizarra { display: flex; justify-content: center; align-items: center; }
        svg { max-width: 100%; height: auto; }

        .panel-inferior {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1a3a1a; padding: 10px; text-align: center;
            border-top: 3px solid #8B4513;
        }
        .panel-inferior p { margin: 5px 0; }
        #mensaje { font-size: 1.2em; min-height: 1.4em; }
        .instruccion { font-size: 1.1em; opacity: 0.7; }
        .btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5); color: #f0f0e8; padding: 12px 16px; border-radius: 8px; margin: 3px; font-size: 1.1em; font-family: 'Indie Flower', cursive; cursor: pointer; }
    </style>
</head>
<body>
    <div id="operacion">
        <div class="pizarra-container">
            <div class="pizarra">
                <div class="progreso" id="progreso"></div>
                <div id="contenidoPizarra"></div>
            </div>
        </div>
        <div class="panel-inferior">
            <p id="mensaje"></p>
            <p class="instruccion">Pulsa en cada casilla para cambiar el numero</p>
            <div>
                <button class="btn" onclick="comprobar()">✓ Comprobar</button>
                <button class="btn" onclick="siguienteTabla()">→ Siguiente</button>
                <button class="btn" onclick="window.location.href='/supermente/index.html'">🏠 Menu</button>
            </div>
        </div>
    </div>

    <script>
        var tablaActual = 1;

        document.addEventListener('DOMContentLoaded', function() {
            generarTablaCompleta();
        });

        function generarTablaCompleta() {
            document.getElementById('progreso').textContent = '📋 Tabla del ' + tablaActual;
            document.getElementById('mensaje').textContent = '';

            var celW = 32, celH = 34;
            var fontSize = 22;
            var filaH = 36;
            var svgW = 260;
            var svgH = 10 * filaH + 15;

            var svg = '<svg viewBox="0 0 ' + svgW + ' ' + svgH + '" style="font-family: Indie Flower, cursive; font-size: ' + fontSize + 'px;">';

            for (var i = 1; i <= 10; i++) {
                var y = (i - 1) * filaH + 28;
                var resultado = tablaActual * i;
                var numDigitos = resultado.toString().length;

                svg += '<text x="15" y="' + y + '" fill="#f0f0e8">' + tablaActual + ' x ' + i + ' = </text>';

                var xBase = 130;
                for (var d = 0; d < numDigitos; d++) {
                    var x = xBase + d * (celW + 2);
                    svg += '<rect x="' + x + '" y="' + (y - 24) + '" width="' + celW + '" height="' + (celH - 2) + '" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.5)" stroke-dasharray="4" rx="4" style="cursor:pointer;" onclick="incrementarCeldaTabla(' + i + ', ' + d + ')"/>';
                    svg += '<text x="' + (x + celW/2) + '" y="' + y + '" text-anchor="middle" fill="#87CEEB" id="tabla_' + i + '_' + d + '" style="pointer-events:none;"></text>';
                }
            }

            svg += '</svg>';
            document.getElementById('contenidoPizarra').innerHTML = svg;
        }

        function incrementarCeldaTabla(fila, col) {
            var el = document.getElementById('tabla_' + fila + '_' + col);
            if (el) {
                var v = el.textContent;
                if (v === '') v = '0';
                else {
                    v = parseInt(v);
                    v = v === 9 ? '' : (v + 1).toString();
                }
                el.textContent = v;
            }
        }

        function siguienteTabla() {
            document.getElementById('mensaje').textContent = '';
            tablaActual++;
            if (tablaActual > 10) {
                tablaActual = 1;
            }
            generarTablaCompleta();
        }

        function comprobar() {
            var ok = true;

            for (var i = 1; i <= 10; i++) {
                var esperado = (tablaActual * i).toString();

                var valorIngresado = '';
                for (var d = 0; d < esperado.length; d++) {
                    var el = document.getElementById('tabla_' + i + '_' + d);
                    if (el) valorIngresado += el.textContent || '';
                }

                for (var d = 0; d < esperado.length; d++) {
                    var rect = document.querySelector('rect[onclick="incrementarCeldaTabla(' + i + ', ' + d + ')"]');
                    var texto = document.getElementById('tabla_' + i + '_' + d);

                    if (rect && texto) {
                        if (valorIngresado === esperado) {
                            rect.setAttribute('fill', 'rgba(0,255,0,0.3)');
                            rect.setAttribute('stroke', 'lightgreen');
                        } else {
                            rect.setAttribute('fill', 'rgba(255,0,0,0.3)');
                            rect.setAttribute('stroke', '#ff6666');
                            texto.textContent = esperado[d];
                            texto.setAttribute('fill', '#ff6666');
                            ok = false;
                        }
                    }
                }
            }

            var msg = document.getElementById('mensaje');
            if (ok) {
                msg.textContent = '¡Muy bien! 🎉';
                msg.style.color = '#90EE90';
                setTimeout(function() {
                    tablaActual++;
                    if (tablaActual > 10) {
                        msg.textContent = '¡Has completado todas las tablas! 🏆';
                    } else {
                        generarTablaCompleta();
                    }
                }, 1500);
            } else {
                msg.textContent = 'Revisa los errores';
                msg.style.color = '#ff9999';
            }
        }
    </script>
</body>
</html>
