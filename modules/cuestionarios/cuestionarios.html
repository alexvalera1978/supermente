<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cuestionarios</title>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #2a5a2a; color: #f0f0e8; margin: 0; padding: 0; font-family: 'Indie Flower', cursive; min-height: 100vh; }
        .oculto { display: none !important; }

        .menu-container { padding: 50px 20px 20px 20px; }
        h1, h2 { text-align: center; margin: 10px 0 20px 0; font-size: 1.8em; text-shadow: 0 0 5px rgba(255,255,255,0.5); }

        .menu-opciones { display: flex; flex-direction: column; gap: 15px; max-width: 350px; margin: 0 auto; }
        .opcion-menu {
            background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.3);
            border-radius: 15px; padding: 20px; cursor: pointer; text-align: center;
        }
        .opcion-menu .icono { font-size: 3em; margin-bottom: 10px; }
        .opcion-menu h3 { margin: 0 0 8px 0; font-size: 1.4em; }
        .opcion-menu p { margin: 0; opacity: 0.7; font-size: 1em; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 1.2em; }
        .form-input {
            width: 100%; padding: 14px; font-size: 1.2em;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px; color: #f0f0e8; font-family: 'Indie Flower', cursive;
        }
        .form-input::placeholder { color: rgba(255,255,255,0.5); }

        .btn-menu {
            background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.4);
            color: #f0f0e8; padding: 15px 20px; font-size: 1.3em; border-radius: 12px;
            font-family: 'Indie Flower', cursive; cursor: pointer; width: 100%;
        }
        .btn {
            background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.5);
            color: #f0f0e8; padding: 12px 20px; border-radius: 8px; font-size: 1.1em;
            font-family: 'Indie Flower', cursive; cursor: pointer; margin: 5px;
        }
        .botones-control { text-align: center; margin-top: 20px; }

        .upload-zona {
            border: 3px dashed rgba(255,255,255,0.4); border-radius: 15px;
            padding: 30px 20px; text-align: center; cursor: pointer; max-width: 400px; margin: 20px auto;
        }
        .upload-zona .icono { font-size: 4em; margin-bottom: 15px; }
        .previsualizacion { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        .preview-foto { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid rgba(255,255,255,0.3); }

        .tema-item {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 12px; padding: 15px; margin: 10px 0; cursor: pointer;
        }
        .tema-item h3 { margin: 0 0 5px 0; }
        .tema-item small { opacity: 0.7; }
        .no-temas { text-align: center; padding: 40px; opacity: 0.7; }

        .detalle-container { max-width: 400px; margin: 0 auto; }
        .detalle-opciones { display: flex; flex-direction: column; gap: 12px; }
        .detalle-opcion {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px; padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 15px;
        }
        .detalle-opcion .icono { font-size: 2em; }
        .detalle-opcion span { font-size: 1.2em; }

        .cuestionario-container { max-width: 500px; margin: 0 auto; padding: 10px; }
        .pregunta-card { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 18px; }
        .pregunta-texto { font-size: 1.5em; margin-bottom: 20px; line-height: 1.5; }
        .opciones { display: flex; flex-direction: column; gap: 12px; }
        .opcion {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 12px; padding: 16px; cursor: pointer; display: flex; align-items: center; gap: 12px;
            font-size: 1.25em; line-height: 1.4;
        }
        .opcion-letra {
            background: rgba(255,255,255,0.2); width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1em;
        }
        .opcion.correcta { background: rgba(0,255,0,0.3); border-color: lightgreen; }
        .opcion.incorrecta { background: rgba(255,0,0,0.3); border-color: #ff6666; }

        .progreso-cuest { text-align: center; margin-bottom: 15px; font-size: 1.2em; opacity: 0.8; }
        .mensaje-cuest { text-align: center; margin-top: 15px; font-size: 1.2em; min-height: 30px; }
        .mensaje-ok { color: #90EE90; }
        .mensaje-error { color: #ff6666; }

        .juego-container { max-width: 500px; margin: 0 auto; padding: 10px; }
        .juego-titulo { text-align: center; font-size: 1.6em; margin-bottom: 10px; }
        .juego-instrucciones { text-align: center; opacity: 0.8; margin-bottom: 15px; font-size: 1.1em; }
        .relacionar-container { display: flex; gap: 12px; justify-content: center; }
        .relacionar-columna { display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .relacionar-item {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px; padding: 14px 10px; text-align: center; cursor: pointer; font-size: 1.15em; line-height: 1.3;
        }
        .relacionar-item.seleccionado { border-color: #00c9ff; background: rgba(0,201,255,0.2); }
        .relacionar-item.emparejado { border-color: lightgreen; background: rgba(0,255,0,0.2); }
        .relacionar-item.error { border-color: #ff6666; background: rgba(255,0,0,0.2); }

        .ordenar-lista { display: flex; flex-direction: column; gap: 10px; }
        .ordenar-item {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px; padding: 14px; display: flex; align-items: center; gap: 12px; cursor: grab;
            font-size: 1.2em; line-height: 1.3;
        }
        .ordenar-item.arrastrando { opacity: 0.5; }
        .ordenar-item.sobre { border-color: #00c9ff; }
        .ordenar-item.correcto { border-color: lightgreen; background: rgba(0,255,0,0.2); }
        .ordenar-item.incorrecto { border-color: #ff6666; background: rgba(255,0,0,0.2); }
        .ordenar-numero { background: rgba(255,255,255,0.2); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1em; }

        .mensaje-juego { text-align: center; margin-top: 15px; font-size: 1.2em; min-height: 30px; }
        .estado-generacion { text-align: center; margin-top: 15px; font-size: 1.1em; }

        /* Juego Naves Arcade */
        .naves-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 500px;
            margin: 0 auto;
            background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 50%, #2a2a6e 100%);
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .naves-pregunta {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            max-width: 90%;
            text-align: center;
            z-index: 10;
        }
        .naves-nave {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.5em;
            cursor: pointer;
            transition: left 0.1s;
            z-index: 5;
        }
        .naves-disparo {
            position: absolute;
            width: 4px;
            height: 15px;
            background: #00ff00;
            border-radius: 2px;
            animation: disparoAnim 0.5s linear forwards;
        }
        @keyframes disparoAnim {
            from { bottom: 70px; }
            to { bottom: 100%; opacity: 0; }
        }
        .naves-respuesta {
            position: absolute;
            padding: 10px 15px;
            background: rgba(255,100,100,0.8);
            border-radius: 10px;
            font-size: 1em;
            cursor: crosshair;
            transition: transform 0.1s;
            animation: caerAnim 8s linear forwards;
        }
        .naves-respuesta.correcta-resp { background: rgba(100,255,100,0.8); }
        .naves-respuesta.destruida {
            animation: explotar 0.3s forwards;
        }
        @keyframes caerAnim {
            from { top: -50px; }
            to { top: 100%; }
        }
        @keyframes explotar {
            to { transform: scale(1.5); opacity: 0; }
        }
        .naves-score {
            position: absolute;
            top: 60px;
            right: 10px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.9em;
        }
        .naves-vidas {
            position: absolute;
            top: 60px;
            left: 10px;
            font-size: 1.2em;
        }

        /* Juego Aventura Grafica */
        .aventura-container {
            max-width: 450px;
            margin: 0 auto;
        }
        .aventura-escena {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.3);
        }
        .aventura-imagen {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
        }
        .aventura-texto {
            padding: 15px;
            font-size: 1.1em;
            line-height: 1.5;
            min-height: 80px;
        }
        .aventura-pregunta {
            padding: 10px 15px;
            background: rgba(255,255,255,0.1);
            font-size: 1.2em;
            font-weight: bold;
        }
        .aventura-opciones {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .aventura-opcion {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .aventura-opcion:hover {
            background: rgba(255,255,255,0.2);
        }
        .aventura-opcion.correcta { border-color: #90EE90; background: rgba(144,238,144,0.3); }
        .aventura-opcion.incorrecta { border-color: #ff6666; background: rgba(255,102,102,0.3); }
        .aventura-feedback {
            padding: 10px 15px;
            text-align: center;
            font-size: 1.1em;
            min-height: 40px;
        }
        .aventura-progreso {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 10px;
        }
        .aventura-punto {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }
        .aventura-punto.actual { background: #00c9ff; }
        .aventura-punto.completado { background: #90EE90; }

        /* Letra ligada */
        .letra-ligada .pregunta-texto,
        .letra-ligada .opcion,
        .letra-ligada .relacionar-item,
        .letra-ligada .ordenar-item {
            font-family: 'Dancing Script', cursive;
            font-size: 1.3em;
        }
    </style>
</head>
<body>
    <div id="menuCuestionarios">
        <div class="menu-container">
            <h1>❓ Cuestionarios</h1>
            <div class="menu-opciones">
                <div class="opcion-menu" onclick="nuevoCuestionario()">
                    <div class="icono">📸</div>
                    <h3>Nuevo Tema</h3>
                    <p>Sube fotos de tu libro para crear cuestionarios</p>
                </div>
                <div class="opcion-menu" onclick="listarCuestionarios()">
                    <div class="icono">📚</div>
                    <h3>Mis Temas</h3>
                    <p>Ver temas guardados</p>
                </div>
            </div>
            <div class="botones-control">
                <button class="btn" onclick="window.location.href='/supermente/index.html'">← Volver al Menu</button>
            </div>
        </div>
    </div>

    <div id="nuevoCuestionario" class="oculto">
        <div class="menu-container">
            <h2>📸 Nuevo Tema</h2>
            <div style="max-width: 400px; margin: 0 auto;">
                <div class="form-group">
                    <label>Nombre del tema:</label>
                    <input type="text" id="nombreTema" class="form-input" placeholder="Ej: Ciencias Naturales..." oninput="actualizarBotonGenerar()">
                </div>
                <div class="form-group">
                    <label>Tipo de juego:</label>
                    <select id="tipoJuego" class="form-input">
                        <option value="relacionar">Relacionar (unir conceptos)</option>
                        <option value="ordenar">Ordenar (secuencias)</option>
                        <option value="naves">Naves Arcade (disparar respuestas)</option>
                        <option value="aventura">Aventura Grafica (explorar y resolver)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Instrucciones adicionales (opcional):</label>
                    <textarea id="promptPersonalizado" class="form-input" rows="3" placeholder="Ej: Enfocate en las fechas importantes, genera preguntas dificiles, usa vocabulario sencillo..."></textarea>
                </div>
                <div class="upload-zona" onclick="document.getElementById('inputFotos').click()">
                    <div class="icono">📷</div>
                    <p>Haz clic para subir fotos de tu libro</p>
                    <input type="file" id="inputFotos" accept="image/*" multiple style="display:none;" onchange="procesarFotos(event)">
                </div>
                <button class="btn" onclick="abrirCamara()" style="width:100%; margin-bottom:15px;">📱 Usar Camara</button>
                <div class="previsualizacion" id="previsualizacion"></div>
                <button class="btn-menu" id="btnGenerar" onclick="generarContenido()" style="display:none;">✨ Generar Cuestionario</button>
                <div class="estado-generacion" id="estadoGeneracion"></div>
            </div>
            <div class="botones-control">
                <button class="btn" onclick="mostrarPantalla('menuCuestionarios')">← Volver</button>
            </div>
        </div>
    </div>

    <div id="listaCuestionarios" class="oculto">
        <div class="menu-container">
            <h2>📚 Mis Temas</h2>
            <div id="listaTemas" style="max-width: 400px; margin: 0 auto;"></div>
            <div class="botones-control">
                <button class="btn" onclick="limpiarTemas()">🗑️ Borrar Todo</button>
                <button class="btn" onclick="mostrarPantalla('menuCuestionarios')">← Volver</button>
            </div>
        </div>
    </div>

    <div id="detalleTema" class="oculto">
        <div class="menu-container">
            <h2 id="tituloTema"></h2>
            <div class="detalle-container">
                <div class="detalle-opciones">
                    <div class="detalle-opcion" onclick="iniciarCuestionario()">
                        <span class="icono">📝</span>
                        <span>Cuestionario</span>
                    </div>
                    <div class="detalle-opcion" onclick="iniciarJuego()">
                        <span class="icono">🎮</span>
                        <span>Juego</span>
                    </div>
                    <div class="detalle-opcion" onclick="verLectura()">
                        <span class="icono">📖</span>
                        <span>Lectura</span>
                    </div>
                </div>
            </div>
            <div class="botones-control">
                <button class="btn" onclick="listarCuestionarios()">← Volver</button>
            </div>
        </div>
    </div>

    <div id="cuestionarioActivo" class="oculto">
        <div class="cuestionario-container">
            <div class="progreso-cuest" id="progresoCuest"></div>
            <div id="preguntaActual"></div>
            <div class="mensaje-cuest" id="mensajeCuest"></div>
        </div>
        <div class="botones-control">
            <button class="btn" id="btnSiguienteCuest" onclick="siguientePregunta()" style="display:none;">→ Siguiente</button>
            <button class="btn" onclick="mostrarPantalla('detalleTema')">← Salir</button>
        </div>
    </div>

    <div id="juegoActivo" class="oculto">
        <div class="juego-container">
            <div class="juego-titulo" id="juegoTitulo"></div>
            <div class="juego-instrucciones" id="juegoInstrucciones"></div>
            <div id="juegoArea"></div>
            <div class="mensaje-juego" id="mensajeJuego"></div>
        </div>
        <div class="botones-control">
            <button class="btn" id="btnComprobarJuego" onclick="comprobarJuego()">✓ Comprobar</button>
            <button class="btn" onclick="mostrarPantalla('detalleTema')">← Salir</button>
        </div>
    </div>

    <script>
        // ==================== CONFIGURACION IA ====================
        var configIA = {
            provider: 'gemini',
            keys: { claude: '', gemini: '' }
        };

        function cargarConfigIA() {
            var saved = localStorage.getItem('configIA');
            if (saved) {
                var savedConfig = JSON.parse(saved);
                configIA.provider = savedConfig.provider || 'claude';
                configIA.keys = savedConfig.keys || {};
            }
        }

        // ==================== ESTADO GLOBAL ====================
        var temaActual = null;
        var cuestionarioActual = null;
        var preguntaActualIdx = 0;
        var puntuacionCuest = 0;
        var fotosSubidas = [];
        var juegoActual = null;
        var estadoJuego = {};

        // ==================== NAVEGACION ====================
        function mostrarPantalla(id) {
            ['menuCuestionarios', 'nuevoCuestionario', 'listaCuestionarios', 'detalleTema', 'cuestionarioActivo', 'juegoActivo'].forEach(function(pid) {
                var el = document.getElementById(pid);
                if (el) el.classList.add('oculto');
            });
            var pantalla = document.getElementById(id);
            if (pantalla) pantalla.classList.remove('oculto');
        }

        function limpiarTemas() {
            if (confirm('¿Seguro que quieres borrar todos los temas guardados?')) {
                localStorage.removeItem('temas');
                alert('Temas borrados correctamente');
                listarCuestionarios();
            }
        }

        function nuevoCuestionario() {
            mostrarPantalla('nuevoCuestionario');
            fotosSubidas = [];
            document.getElementById('previsualizacion').innerHTML = '';
            document.getElementById('nombreTema').value = '';
            document.getElementById('btnGenerar').style.display = 'none';
            document.getElementById('estadoGeneracion').innerHTML = '';
        }

        function procesarFotos(event) {
            var files = event.target.files;
            var preview = document.getElementById('previsualizacion');
            for (var i = 0; i < files.length; i++) {
                (function(file) {
                    var reader = new FileReader();
                    reader.onload = function(e) {
                        fotosSubidas.push(e.target.result);
                        var img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'preview-foto';
                        preview.appendChild(img);
                        actualizarBotonGenerar();
                    };
                    reader.readAsDataURL(file);
                })(files[i]);
            }
        }

        function abrirCamara() {
            var input = document.getElementById('inputFotos');
            input.setAttribute('capture', 'environment');
            input.click();
        }

        function actualizarBotonGenerar() {
            var nombre = document.getElementById('nombreTema').value.trim();
            var btn = document.getElementById('btnGenerar');
            if (fotosSubidas.length > 0 && nombre) {
                btn.style.display = 'block';
            } else {
                btn.style.display = 'none';
            }
        }

        async function generarContenido() {
            var nombre = document.getElementById('nombreTema').value.trim();
            var estado = document.getElementById('estadoGeneracion');
            var key = configIA.keys.gemini;

            if (!key) {
                estado.innerHTML = '❌ No hay API key de Gemini configurada';
                return;
            }

            estado.innerHTML = '⏳ Analizando imagenes con IA...';

            try {
                var contenidoIA = await generarContenidoConIA(nombre, fotosSubidas, key);
                var nuevoTema = {
                    id: Date.now(),
                    nombre: nombre,
                    fechaCreacion: new Date().toLocaleDateString(),
                    imagenes: [],
                    cuestionario: contenidoIA.cuestionario,
                    juego: contenidoIA.juego,
                    lectura: contenidoIA.lectura
                };
                guardarTema(nuevoTema);
                estado.innerHTML = '✅ ¡Tema creado!';
                setTimeout(function() {
                    temaActual = nuevoTema;
                    mostrarDetalleTema();
                }, 1500);
            } catch (error) {
                estado.innerHTML = '❌ Error: ' + error.message;
                console.error(error);
            }
        }

        async function generarContenidoConIA(nombre, imagenes, key) {
            var tipoJuego = document.getElementById('tipoJuego').value;
            var promptPersonalizado = document.getElementById('promptPersonalizado').value.trim();

            var juegoEstructura = '';
            if (tipoJuego === 'relacionar') {
                juegoEstructura = '"juego": {\n    "tipo": "relacionar",\n    "titulo": "...",\n    "instrucciones": "Une cada termino con su definicion",\n    "elementos": [{"izq": "Termino1", "der": "Definicion1"}, {"izq": "Termino2", "der": "Definicion2"}]\n  }';
            } else if (tipoJuego === 'ordenar') {
                juegoEstructura = '"juego": {\n    "tipo": "ordenar",\n    "titulo": "...",\n    "instrucciones": "Ordena los elementos correctamente",\n    "elementos": ["Primer paso", "Segundo paso", "Tercer paso"]\n  }';
            } else if (tipoJuego === 'naves') {
                juegoEstructura = '"juego": {\n    "tipo": "naves",\n    "titulo": "Destruye las respuestas incorrectas",\n    "instrucciones": "Dispara a las respuestas INCORRECTAS y deja pasar las correctas",\n    "oleadas": [\n      {\n        "pregunta": "Pregunta sobre el tema",\n        "respuestas": [\n          {"texto": "Respuesta correcta", "correcta": true},\n          {"texto": "Respuesta incorrecta 1", "correcta": false},\n          {"texto": "Respuesta incorrecta 2", "correcta": false}\n        ]\n      }\n    ]\n  }';
            } else if (tipoJuego === 'aventura') {
                juegoEstructura = '"juego": {\n    "tipo": "aventura",\n    "titulo": "Aventura de conocimiento",\n    "escenas": [\n      {\n        "id": 1,\n        "descripcion": "Descripcion de la escena inicial relacionada con el tema",\n        "imagen": "biblioteca",\n        "pregunta": "Pregunta para avanzar",\n        "opciones": [\n          {"texto": "Opcion correcta", "correcta": true, "siguiente": 2, "feedback": "Muy bien!"},\n          {"texto": "Opcion incorrecta", "correcta": false, "siguiente": 1, "feedback": "Incorrecto, intenta de nuevo"}\n        ]\n      },\n      {\n        "id": 2,\n        "descripcion": "Segunda escena",\n        "imagen": "laboratorio",\n        "pregunta": "Siguiente pregunta",\n        "opciones": [...]\n      }\n    ]\n  }';
            }

            var promptExtra = promptPersonalizado ? '\n\nINSTRUCCIONES ADICIONALES DEL USUARIO: ' + promptPersonalizado : '';

            var prompt = 'Analiza estas imagenes de un libro sobre "' + nombre + '".' + promptExtra + '\n\nGenera un JSON con:\n{\n  "cuestionario": [\n    {"pregunta": "Pregunta basada en el contenido", "opciones": ["Opcion A", "Opcion B", "Opcion C", "Opcion D"], "correcta": 0, "explicacion": "Breve explicacion de por que esta es la respuesta correcta"}\n  ],\n  "lectura": "Resumen educativo del contenido adaptado para ninos...",\n  ' + juegoEstructura + '\n}\n\nREQUISITOS:\n- Genera EXACTAMENTE 10 preguntas de cuestionario\n- Cada pregunta DEBE incluir "explicacion" para mostrar cuando el usuario falle\n- El juego debe tener al menos 5-6 elementos/oleadas/escenas\n- Basa TODO en el contenido REAL de las imagenes\n- RESPONDE SOLO CON JSON VALIDO.';

            return await generarConGemini(prompt, imagenes, key);
        }

        async function generarConGemini(prompt, imagenes, key) {
            var parts = [{ text: prompt }];
            for (var i = 0; i < imagenes.length; i++) {
                var img = imagenes[i];
                parts.push({
                    inline_data: {
                        mime_type: img.split(';')[0].split(':')[1],
                        data: img.split(',')[1]
                    }
                });
            }

            var response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + key, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: parts }],
                    generationConfig: { maxOutputTokens: 16384 }
                })
            });

            if (!response.ok) throw new Error('Error con Gemini API');
            var data = await response.json();
            var texto = data.candidates[0].content.parts[0].text;
            return parsearJSONSeguro(texto);
        }

        function parsearJSONSeguro(texto) {
            var clean = texto.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
            try { return JSON.parse(clean); }
            catch (e) {
                clean = clean.replace(/,\s*$/, '');
                var openBrackets = (clean.match(/\[/g) || []).length;
                var closeBrackets = (clean.match(/\]/g) || []).length;
                var openBraces = (clean.match(/\{/g) || []).length;
                var closeBraces = (clean.match(/\}/g) || []).length;
                for (var i = 0; i < openBrackets - closeBrackets; i++) clean += ']';
                for (var i = 0; i < openBraces - closeBraces; i++) clean += '}';
                return JSON.parse(clean);
            }
        }

        function seleccionarRelacionar(elem) {
            if (elem.classList.contains('emparejado')) return;
            var lado = elem.dataset.lado;
            var valor = elem.dataset.valor;

            if (lado === 'izq') {
                document.querySelectorAll('#colIzq .relacionar-item.seleccionado').forEach(function(e) { e.classList.remove('seleccionado'); });
                elem.classList.add('seleccionado');
                estadoJuego.seleccionIzq = valor;
            } else if (lado === 'der' && estadoJuego.seleccionIzq) {
                var parCorrecto = estadoJuego.paresCorrectos.find(function(p) {
                    return p.izq === estadoJuego.seleccionIzq && p.der === valor;
                });
                var itemIzq = document.querySelector('#colIzq .relacionar-item[data-valor="' + estadoJuego.seleccionIzq + '"]');

                if (parCorrecto) {
                    itemIzq.classList.remove('seleccionado');
                    itemIzq.classList.add('emparejado');
                    elem.classList.add('emparejado');
                    estadoJuego.emparejados.push(parCorrecto);
                    estadoJuego.seleccionIzq = null;

                    if (estadoJuego.emparejados.length === estadoJuego.paresCorrectos.length) {
                        document.getElementById('mensajeJuego').textContent = '🎉 ¡Todos los pares encontrados!';
                        document.getElementById('btnComprobarJuego').style.display = 'none';
                    }
                } else {
                    elem.classList.add('error');
                    itemIzq.classList.add('error');
                    setTimeout(function() {
                        elem.classList.remove('error');
                        itemIzq.classList.remove('error', 'seleccionado');
                        estadoJuego.seleccionIzq = null;
                    }, 500);
                }
            }
        }

                    item.classList.remove('correcto', 'incorrecto');

        function moverNave(e) {
            if (!navesEstado.juegoActivo) return;
            var canvas = document.getElementById('navesCanvas');
            if (!canvas) return;
            var rect = canvas.getBoundingClientRect();
            var x = ((e.clientX - rect.left) / rect.width) * 100;
            x = Math.max(10, Math.min(90, x));
            navesEstado.naveX = x;
            var nave = document.getElementById('navesNave');
            if (nave) nave.style.left = x + '%';
        }

        function moverNaveTactil(e) {
            if (!navesEstado.juegoActivo) return;
            var canvas = document.getElementById('navesCanvas');
            if (!canvas) return;
            var rect = canvas.getBoundingClientRect();
            var touch = e.touches[0];
            var x = ((touch.clientX - rect.left) / rect.width) * 100;
            x = Math.max(10, Math.min(90, x));
            navesEstado.naveX = x;
            var nave = document.getElementById('navesNave');
            if (nave) nave.style.left = x + '%';
        }

        function iniciarOleada() {
            if (navesEstado.oleadaActual >= juegoActual.oleadas.length) {
                finalizarJuegoNaves(true);
                return;

            var oleada = juegoActual.oleadas[navesEstado.oleadaActual];
            document.getElementById('navesPregunta').textContent = oleada.pregunta;

            // Limpiar respuestas anteriores
            navesEstado.respuestasActivas = [];
            document.querySelectorAll('.naves-respuesta').forEach(function(r) { r.remove(); });

            // Lanzar respuestas con delay
            var delay = 0;
            oleada.respuestas.forEach(function(resp, i) {
                setTimeout(function() {
                    if (navesEstado.juegoActivo) crearRespuestaNave(resp, i);
                }, delay);
                delay += 1500;
            });

        function crearRespuestaNave(resp, idx) {
            var canvas = document.getElementById('navesCanvas');
            if (!canvas) return;

            var div = document.createElement('div');
            div.className = 'naves-respuesta' + (resp.correcta ? ' correcta-resp' : '');
            div.textContent = resp.texto;
            div.dataset.correcta = resp.correcta;
            div.dataset.idx = idx;
            div.style.left = (15 + Math.random() * 60) + '%';

            div.onclick = function(e) {
                e.stopPropagation();
                dispararARespuesta(div);
            };

            canvas.appendChild(div);
            navesEstado.respuestasActivas.push(div);

            // Detectar cuando llega abajo
            div.addEventListener('animationend', function() {
                if (!div.classList.contains('destruida')) {
                    if (div.dataset.correcta === 'false') {
                        // Respuesta incorrecta llego abajo = perdemos vida
                        perderVida();
                    }
                    div.remove();
                    verificarFinOleada();
                }
            });
        }

        function dispararNave(e) {
            if (!navesEstado.juegoActivo) return;
            var canvas = document.getElementById('navesCanvas');
            var rect = canvas.getBoundingClientRect();

            // Crear disparo visual
            var disparo = document.createElement('div');
            disparo.className = 'naves-disparo';
            disparo.style.left = navesEstado.naveX + '%';
            canvas.appendChild(disparo);
            setTimeout(function() { disparo.remove(); }, 500);
        }

        function dispararARespuesta(div) {
            if (!navesEstado.juegoActivo || div.classList.contains('destruida')) return;

            var esCorrecta = div.dataset.correcta === 'true';

            if (esCorrecta) {
                // Disparar a respuesta correcta = error
                div.classList.add('destruida');
                perderVida();
            } else {
                // Disparar a respuesta incorrecta = bien!
                div.classList.add('destruida');
                navesEstado.score += 10;
                document.getElementById('navesScore').textContent = 'Score: ' + navesEstado.score;
            }

            setTimeout(function() {
                div.remove();
                verificarFinOleada();
            }, 300);
        }

        function perderVida() {
            navesEstado.vidas--;
            var vidasHTML = '';
            for (var i = 0; i < navesEstado.vidas; i++) vidasHTML += '❤️';
            for (var i = navesEstado.vidas; i < 3; i++) vidasHTML += '🖤';
            document.getElementById('navesVidas').innerHTML = vidasHTML;

            if (navesEstado.vidas <= 0) {
                finalizarJuegoNaves(false);
            }

        function verificarFinOleada() {
            var activas = document.querySelectorAll('.naves-respuesta:not(.destruida)');
            if (activas.length === 0 && navesEstado.juegoActivo) {
                navesEstado.oleadaActual++;
                setTimeout(iniciarOleada, 1000);

                montaña: 'linear-gradient(135deg, #5a5a6a 0%, #3a3a4a 100%)',
                ciudad: 'linear-gradient(135deg, #3a3a4a 0%, #2a2a3a 100%)',
                cueva: 'linear-gradient(135deg, #2a2a3a 0%, #1a1a2a 100%)',
                jardin: 'linear-gradient(135deg, #3d5a2d 0%, #2a3d1a 100%)'
            };

            var progreso = '';
            for (var i = 0; i < escenas.length; i++) {
                var clase = i < aventuraEstado.escenaActual ? 'completado' : (i === aventuraEstado.escenaActual ? 'actual' : '');
                progreso += '<div class="aventura-punto ' + clase + '"></div>';
            }

            area.innerHTML = '<div class="aventura-container">' +
                '<div class="aventura-progreso">' + progreso + '</div>' +
                '<div class="aventura-escena">' +
                    '<div class="aventura-imagen" style="background:' + (bgColors[imgKey] || bgColors.biblioteca) + '">' + emoji + '</div>' +
                    '<div class="aventura-texto">' + escena.descripcion + '</div>' +
                    '<div class="aventura-pregunta">' + escena.pregunta + '</div>' +
                    '<div class="aventura-opciones" id="aventuraOpciones">' +
                        escena.opciones.map(function(op, i) {
                            return '<div class="aventura-opcion" onclick="seleccionarAventura(' + i + ')">' + op.texto + '</div>';
                        }).join('') +
                    '</div>' +
                    '<div class="aventura-feedback" id="aventuraFeedback"></div>' +
                '</div>' +
                '</div>';
        }

        function seleccionarAventura(idx) {
            var escena = juegoActual.escenas[aventuraEstado.escenaActual];
            var opcion = escena.opciones[idx];
            var opciones = document.querySelectorAll('.aventura-opcion');

            opciones.forEach(function(op, i) {
                op.onclick = null;
                if (escena.opciones[i].correcta) {
                    op.classList.add('correcta');
                } else if (i === idx) {
                    op.classList.add('incorrecta');
                }
            });

            var feedback = document.getElementById('aventuraFeedback');
            if (opcion.correcta) {
                aventuraEstado.puntos += 10;
                feedback.innerHTML = '✅ ' + (opcion.feedback || '¡Correcto!');
                feedback.style.color = '#90EE90';
            } else {
                feedback.innerHTML = '❌ ' + (opcion.feedback || 'Incorrecto');
                feedback.style.color = '#ff6666';
            }

            aventuraEstado.historial.push({
                escena: aventuraEstado.escenaActual,
                correcta: opcion.correcta
            });

            setTimeout(function() {
                aventuraEstado.escenaActual++;
                mostrarEscenaAventura(document.getElementById('juegoArea'));
            }, 2000);
        }

        function finalizarAventura(area) {
            var correctas = aventuraEstado.historial.filter(function(h) { return h.correcta; }).length;
            var total = aventuraEstado.historial.length;
            var porcentaje = Math.round((correctas / total) * 100);

            var emoji = porcentaje >= 80 ? '🏆' : porcentaje >= 60 ? '⭐' : '📚';
            var mensaje = porcentaje >= 80 ? '¡Aventura completada con exito!' :
                         porcentaje >= 60 ? '¡Buen intento!' : '¡Sigue explorando!';

            area.innerHTML = '<div style="text-align:center; padding:30px;">' +
                '<div style="font-size:4em; margin-bottom:20px;">' + emoji + '</div>' +
                '<div style="font-size:1.5em; margin-bottom:10px;">Aventura Finalizada</div>' +
                '<div style="font-size:1.2em; margin-bottom:15px;">' + correctas + '/' + total + ' decisiones correctas</div>' +
                '<div style="margin-bottom:20px;">' + mensaje + '</div>' +
                '<div style="font-size:1.3em; color:#e8954a;">Puntos: ' + aventuraEstado.puntos + '</div>' +
                '</div>';

            document.getElementById('btnComprobarJuego').textContent = '🔄 Reiniciar';
            document.getElementById('btnComprobarJuego').style.display = 'inline-block';
            document.getElementById('btnComprobarJuego').onclick = function() { iniciarJuego(); };
        }

        // Inicializacion
        document.addEventListener('DOMContentLoaded', function() {
            cargarConfigIA();
            aplicarTipoLetra();
        });

        function aplicarTipoLetra() {
            var tipo = localStorage.getItem('tipoLetra') || 'normal';
            var containers = ['cuestionarioActivo', 'juegoActivo'];
            containers.forEach(function(id) {
                var el = document.getElementById(id);
                if (el) {
                    if (tipo === 'ligada') {
                        el.classList.add('letra-ligada');
                    } else {
                        el.classList.remove('letra-ligada');
                    }
                }
            });
        }
    </script>
</body>
</html>
